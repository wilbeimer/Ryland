services:
  frontend:
    build:
      context: ./
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - 8080:80

  backend:
    build: 
      context: ./
      dockerfile: backend/Dockerfile
    ports:
      - 8000:8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./backend/data:/backend/data
